<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="Saatleri sanal olarak bileğinizde deneyin">
  <title>WristView — Sanal Saat Deneme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ── Kamera ── -->
  <video id="camera" autoplay playsinline muted></video>

  <!-- ── WebGL Composite Canvas ── -->
  <canvas id="output"></canvas>

  <!-- ── Üst Bar ── -->
  <header id="top-bar">
    <div class="brand">
      <span class="brand-icon">⌚</span>
      <span class="brand-name">WristView</span>
    </div>
    <div class="top-actions">
      <button id="camera-switch-btn" class="icon-btn" title="Kamera Değiştir">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 16v4a2 2 0 0 1-2 2h-4"/><path d="M14 2H6a2 2 0 0 0-2 2v4"/>
          <path d="M4 16l4-4-4-4"/><path d="M20 8l-4 4 4 4"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Durum ── -->
  <div id="status-bar">
    <div class="status-dot"></div>
    <span id="status-text">Hazırlanıyor...</span>
  </div>

  <!-- ── Seçili Saat Bilgisi ── -->
  <div id="watch-info-card">
    <div class="watch-info-inner">
      <span id="info-brand" class="watch-brand">—</span>
      <span id="info-model" class="watch-model">—</span>
      <span id="info-price" class="watch-price">—</span>
    </div>
  </div>

  <!-- ── Alt Panel: Saat Galerisi + Kontroller ── -->
  <div id="bottom-panel">

    <!-- Boyut -->
    <div id="size-control">
      <button id="size-down" class="size-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <span id="size-value">100%</span>
      <button id="size-up" class="size-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <!-- Saat Galerisi -->
    <div id="watch-gallery-wrap">
      <div id="watch-gallery">
        <!-- JS tarafından doldurulur -->
      </div>
    </div>

    <!-- Fotoğraf Butonu -->
    <div id="action-row">
      <button id="capture-btn" class="capture-btn" title="Fotoğraf Çek">
        <div class="capture-ring"><div class="capture-inner"></div></div>
      </button>
    </div>

    <p class="bottom-hint">Bileğinizi kameraya gösterin</p>
  </div>

  <!-- ── Splash ── -->
  <div id="splash-screen">
    <div class="splash-content">
      <div class="splash-logo">
        <div class="logo-circle">⌚</div>
      </div>
      <h1 class="splash-title">WristView</h1>
      <p class="splash-subtitle">Saatleri Sanal Olarak Deneyin</p>

      <div class="splash-features">
        <div class="feature-item"><span class="fi">📸</span><span>Kameranızı bileğinize tutun</span></div>
        <div class="feature-item"><span class="fi">⌚</span><span>Saati bileğinizde görün</span></div>
        <div class="feature-item"><span class="fi">🔄</span><span>Bileğinizi döndürün — saat de döner</span></div>
        <div class="feature-item"><span class="fi">💾</span><span>Fotoğraf çekip kaydedin</span></div>
      </div>

      <button id="start-btn">
        <span class="btn-text">Denemeye Başla</span>
        <span class="btn-arrow">→</span>
      </button>

      <p id="error-msg"></p>
      <p class="splash-note">Kamera erişimi gereklidir · HTTPS zorunlu</p>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div id="capture-toast"><span>✅ Fotoğraf kaydedildi!</span></div>

</div>

<!-- Libraries — sıralı yükleme önemli -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="app.js"></script>
</body>
</html>
