<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sanal Saat Deneme</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="app">

        <!-- Kamera -->
        <video id="camera" autoplay playsinline muted></video>

        <!-- Saat çizim katmanı -->
        <canvas id="output"></canvas>

        <!-- Debug bilgisi -->
        <div id="debug">Sayfa yüklendi. BAŞLAT butonuna bas.</div>

        <!-- Kontroller (başta gizli) -->
        <div id="controls">
            <button id="size-down">➖ Küçült</button>
            <button id="capture-btn">📸 Fotoğraf Çek</button>
            <button id="size-up">➕ Büyüt</button>
        </div>

        <!-- Başlangıç ekranı -->
        <div id="loading">
            <div class="loading-content">
                <p class="loading-title">⌚ Sanal Saat Deneme</p>
                <p class="loading-sub">Kameraya erişim gerekiyor</p>
                <button id="start-btn">🎬 BAŞLAT</button>
                <p id="error-msg"></p>
            </div>
        </div>

    </div>

    <script src="js/app.js"></script>

</body>
</html>
