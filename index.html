<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanal Saat Deneme</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Kamera Görüntüsü -->
        <video id="camera" autoplay playsinline></video>
        <canvas id="output"></canvas>

        <!-- Saat Seçim Paneli -->
        <div id="watch-panel">
            <h3>🕐 Saat Seç</h3>
            <div class="watch-options">
                <div class="watch-card active" data-model="watch1">
                    <img src="assets/watch1-thumb.png" alt="Klasik Saat">
                    <p>Klasik Gold</p>
                </div>
            </div>
        </div>

        <!-- Kontroller -->
        <div id="controls">
            <button id="capture-btn">📸 Fotoğraf Çek</button>
            <button id="size-up">➕ Büyüt</button>
            <button id="size-down">➖ Küçült</button>
        </div>

        <!-- Yükleme Ekranı -->
        <div id="loading">
            <p>Kamera başlatılıyor...</p>
        </div>
    </div>

    <!-- Kütüphaneler -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
